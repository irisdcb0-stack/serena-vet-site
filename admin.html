  <main>
    <section class="section">
      <div class="container">
        <h1>Panel administrativo — Citas</h1>

        <div id="admin-auth">
          <label>Contraseña de administrador: <input id="admin-pass" type="password"></label>
          <button id="admin-login">Entrar</button>

        <div id="admin-root" style="display:none">
          <div id="admin-list">Cargando...</div>
        </div>
      </div>
    </section>
